<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Notizen</title><link rel="icon" type="image/svg+xml" href="/static/icons/book-plus.svg">
    <link rel="stylesheet" href="/static/style.css?v={{ v }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-color);
            margin: 0;
            font-family: sans-serif;
        }
        
        .login-box {
            background: var(--sidebar-bg);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        
        .login-box h1 {
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--text-color);
        }
        
        .login-box input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.2s, opacity 0.2s;
        }
        
        .login-box input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .login-box button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        
        .login-box button:hover:not(:disabled) {
            opacity: 0.9;
        }
        
        .error-message {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }
    </style>
</head>
<body data-theme="{{ theme }}">
    <script>
        const initialAccent = '{{ accent }}';
        document.documentElement.style.setProperty('--accent', initialAccent); 
    </script>
    
    <div class="login-box">
        <h1><i class="icon icon-password"></i> Geschützt</h1>
        
        {% if error %}
        <div class="error-message" id="error-box">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login">
            <input type="password" id="pw-input" name="password" placeholder="Passwort eingeben..." required autofocus>
            <button type="submit" id="submit-btn">Entsperren</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const errorBox = document.getElementById('error-box');
            
            if (errorBox) {
                const text = errorBox.innerText;
                let lockTime = 0;
                
                if (text.includes("5 Sekunden Wartezeit")) {
                    lockTime = 5;
                } else if (text.match(/gesperrt für (\d+) Sekunde/)) {
                    lockTime = parseInt(text.match(/gesperrt für (\d+) Sekunde/)[1]);
                } else if (text.match(/gesperrt für (\d+) Minute/)) {
                    lockTime = parseInt(text.match(/gesperrt für (\d+) Minute/)[1]) * 60;
                } else if (text.includes("5 Minuten gesperrt")) {
                    lockTime = 300;
                }

                if (lockTime > 0) {
                    const input = document.getElementById('pw-input');
                    const btn = document.getElementById('submit-btn');
                    
                    input.disabled = true;
                    btn.disabled = true;
                    input.style.opacity = '0.5';
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                    
                    const interval = setInterval(() => {
                        lockTime--;
                        
                        if (lockTime > 60) {
                            btn.innerText = `Gesperrt (${Math.ceil(lockTime / 60)} Min)`;
                        } else {
                            btn.innerText = `Gesperrt (${lockTime}s)`;
                        }
                        
                        if (lockTime <= 0) {
                            clearInterval(interval);
                            input.disabled = false;
                            btn.disabled = false;
                            input.style.opacity = '1';
                            btn.style.opacity = '1';
                            btn.style.cursor = 'pointer';
                            btn.innerText = "Entsperren";
                            errorBox.style.display = 'none';
                            input.focus();
                        }
                    }, 1000);
                }
            }
        });
    </script>
</body>
</html>
